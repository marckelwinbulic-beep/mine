<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Am Sorry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 90%;
        }

        h1 {
            font-size: 3.5rem;
            color: #e74c3c;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        .heart {
            font-size: 5rem;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .message-box {
            background: #fafafa;
            border-left: 4px solid #e74c3c;
            padding: 2rem;
            margin: 2rem 0;
            border-radius: 10px;
            text-align: left;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.8;
            color: #555;
            font-size: 1.1rem;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #e74c3c;
            margin-left: 2px;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
        }

        .start-btn {
            background: #e74c3c;
            color: white;
        }

        .start-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .start-btn:disabled {
            background: #e0a8a4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }

        .reset-btn {
            background: #95a5a6;
            color: white;
        }

        .reset-btn:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(149, 165, 166, 0.4);
        }

        .sub-message {
            font-size: 0.9rem;
            color: #999;
            margin-top: 1rem;
            font-style: italic;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.5rem;
            }
            .container {
                padding: 1.5rem;
            }
            .message-box {
                padding: 1.2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">💔</div>
        <h1>I Am Sorry</h1>
        
        <div class="message-box" id="messageBox">
            <span id="typedText"></span><span class="typing-cursor" id="cursor"></span>
        </div>

        <div class="button-container">
            <button class="start-btn" id="startBtn">Read My Letter 💌</button>
            <button class="reset-btn" id="resetBtn">Read Again 🔄</button>
        </div>

        <p class="sub-message">I hope you can forgive me</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            var message = "Hello lovey. I am very sorry sa mga masasamang bagay na ginawa ko sa iyo. I can't say other words more than sorry because nagsisisi ako sa mga ginawa ko sayo. I'm thankful kasi you gave me another chance to continue loving you. I know marami akong kailangan pang gawin at ibawi para maibalik ko yung tiwalang nawala ko dahil sa mga ginawa ko noon. I hope na we can continue what we started this year. All the things na sinabi ko na I want to settle with you until the end were true. Sana hindi ka magsawa sa ugali ko Kahit alam kong masama ako and may mga times na paulit-ulit lang yung ginagawa ko. I am always trying love, and I always find ways to improve and gawin lahat ng makakaya ko mapasaya kalang and maibigay lahat sa'yo. Sana dumating yung araw na ako parin yung kasama mo kapag okay kana at isang part nalang ng journey natin yung mga masasamang nangyari ng relasyon natin. Gusto ko kasama mo ako pag kinwento mo sa babies natin na \"Alam nyo bang ilang beses ako pina-iyak ng Dad nyo noon\". Mga ganong klase ng bagay. I love you so much baby ko. I am really sorry kung medyo awkward parin akong kausapin ka until now. I want to take things slow with you kaya gumawa ako ng ganto para masabi ko lahat ng gusto kong sabihin sayo. Always take care baby ko and I love you so muchie <3 ( ˘ ³˘)♥︎.";

            var typingInterval;
            var currentIndex = 0;
            
            var typedTextElement = document.getElementById('typedText');
            var cursorElement = document.getElementById('cursor');
            var startBtn = document.getElementById('startBtn');
            var resetBtn = document.getElementById('resetBtn');
            var messageBox = document.getElementById('messageBox');

            function startTyping() {
                if (typingInterval) {
                    clearInterval(typingInterval);
                }
                
                currentIndex = 0;
                typedTextElement.textContent = '';
                cursorElement.style.display = 'inline-block';
                startBtn.disabled = true;
                
                typingInterval = setInterval(function() {
                    if (currentIndex < message.length) {
                        typedTextElement.textContent += message.charAt(currentIndex);
                        currentIndex++;
                        messageBox.scrollTop = messageBox.scrollHeight;
                    } else {
                        clearInterval(typingInterval);
                        cursorElement.style.display = 'none';
                        startBtn.disabled = false;
                    }
                }, 40);
            }

            function resetMessage() {
                if (typingInterval) {
                    clearInterval(typingInterval);
                }
                currentIndex = 0;
                typedTextElement.textContent = '';
                cursorElement.style.display = 'inline-block';
                startBtn.disabled = false;
            }

            startBtn.addEventListener('click', startTyping);
            resetBtn.addEventListener('click', resetMessage);

            setTimeout(startTyping, 1000);
        });
    </script>
</body>
</html>
