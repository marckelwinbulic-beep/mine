<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Am Sorry</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="heart">💔</div>
        <h1>I Am Sorry</h1>
        
        <div class="message-box" id="messageBox">
            <span id="typedText"></span><span class="typing-cursor" id="cursor"></span>
        </div>

        <div class="button-container">
            <button class="start-btn" onclick="startTyping()">Read My Letter 💌</button>
            <button class="reset-btn" onclick="resetMessage()">Read Again 🔄</button>
        </div>

        <p class="sub-message">I hope you can forgive me</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
